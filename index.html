<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TN Weather Analytics | Premium Dashboard</title>
    <meta name="description" content="Real-time weather analytics and 5-day forecast for all districts of Tamil Nadu. Premium design with interactive charts.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-container">
        <!-- Sidebar/Selector -->
        <header class="glass-nav">
            <div class="brand">
                <i class="bi bi-cloud-sun-fill"></i>
                <h1>TN Analytics</h1>
            </div>
            <div class="search-container">
                <div class="custom-select" id="districtSelect">
                    <div class="custom-select__trigger">
                        <span>Select District</span>
                        <i class="bi bi-chevron-down"></i>
                    </div>
                    <div class="custom-options">
                        <div class="dropdown-search">
                            <input type="text" placeholder="Search district..." id="districtSearch">
                        </div>
                        <div id="districtList">
                            <!-- Options populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="dashboard">
            <!-- Hero Weather Section -->
            <section class="hero-section glass-card" id="currentWeather">
                <div class="weather-main">
                    <div class="location">
                        <h2 id="cityName">Chennai</h2>
                        <p id="currentDate">Thursday, 14 May</p>
                    </div>
                    <div class="temp-display">
                        <span id="currentTemp">--°</span>
                        <div class="condition-box">
                            <i id="weatherIcon" class="bi bi-sun"></i>
                            <span id="weatherDesc">Loading...</span>
                        </div>
                    </div>
                </div>
                <div class="weather-details">
                    <div class="detail-item">
                        <i class="bi bi-droplets"></i>
                        <span class="label">Humidity</span>
                        <span class="value" id="humidity">--%</span>
                    </div>
                    <div class="detail-item">
                        <i class="bi bi-wind"></i>
                        <span class="label">Wind Speed</span>
                        <span class="value" id="windSpeed">-- km/h</span>
                    </div>
                    <div class="detail-item">
                        <i class="bi bi-umbrella"></i>
                        <span class="label">Rain Prob</span>
                        <span class="value" id="rainProb">-- mm</span>
                    </div>
                </div>
            </section>

            <!-- Analytics Section -->
            <section class="analytics-section">
                <div class="analytics-grid">
                    <!-- Temperature Trend Chart -->
                    <div class="chart-container glass-card">
                        <h3><i class="bi bi-graph-up"></i> Temperature Forecast (°C)</h3>
                        <div class="chart-wrapper">
                            <canvas id="tempChart"></canvas>
                        </div>
                    </div>
                    <!-- Humidity/Precipitation Bar Chart -->
                    <div class="chart-container glass-card">
                        <h3><i class="bi bi-bar-chart"></i> Humidity & Rain (%)</h3>
                        <div class="chart-wrapper">
                            <canvas id="precipChart"></canvas>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 5-Day Forecast Grid -->
            <section class="forecast-section">
                <h3>5-Day Extended Forecast</h3>
                <div class="forecast-grid" id="forecastGrid">
                    <!-- Forecast items populated by JS -->
                </div>
            </section>
        </main>

        <footer class="glass-footer">
            <p>&copy; 2026 TN Weather Analytics • Real-time Data via Open-Meteo</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
